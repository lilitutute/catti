<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西语学习排版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="nav">
        <button onclick="loadArticle('01')" id="btn-01">第01篇</button>
        <button onclick="loadArticle('02')" id="btn-02">第02篇</button>
        <button onclick="loadArticle('03')" id="btn-03">第03篇</button>
    </div>

    <div id="app">
        <p style="color:#999;">加载中...</p>
    </div>

    <script>
        function highlight(text) {
            return text.replace(/\\{\\{(.+?)\\}\\}/g, '<span class="highlight">$1</span>');
        }

        function loadArticle(file) {
            // 更新按钮状态
            document.querySelectorAll('.nav button').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById('btn-' + file);
            if (activeBtn) activeBtn.classList.add('active');

            fetch('articles/' + file + '.json')
                .then(res => {
                    if (!res.ok) throw new Error('文件未找到');
                    return res.json();
                })
                .then(data => {
                    const app = document.getElementById('app');
                    app.innerHTML = '';

                    data.paragraphs.forEach(p => {
                        // 词汇列表
                        const vocabItems = p.vocab.map(v => `
                            <li>
                                <span class="zh-word">${v.zh}</span>
                                <span class="arrow">→</span>
                                <span class="es-word">${v.es}</span>
                            </li>`).join('');

                        // 句式模板
                        const patternItems = p.patterns.map(pt =>
                            `<li>${pt}</li>`
                        ).join('');

                        app.innerHTML += `
                            <div class="article-card">

                                <!-- 上：中西对照 -->
                                <div class="bilingual">
                                    <div class="zh-col">${highlight(p.zh)}</div>
                                    <div class="es-col">${highlight(p.es)}</div>
                                </div>

                                <!-- 分隔线 -->
                                <div class="divider"></div>

                                <!-- 下：固定搭配 + 句式模板 -->
                                <div class="knowledge">
                                    <div class="vocab-section">
                                        <div class="section-title">固定搭配</div>
                                        <ul class="vocab-list">${vocabItems}</ul>
                                    </div>
                                    <div class="pattern-section">
                                        <div class="section-title">句式模板</div>
                                        <ul class="pattern-list">${patternItems}</ul>
                                    </div>
                                </div>

                            </div>`;
                    });
                })
                .catch(err => {
                    document.getElementById('app').innerHTML =
                        `<p style="color:red;">⚠️ 加载失败：${err.message}</p>`;
                });
        }

        loadArticle('01');
    </script>

</body>
</html>
