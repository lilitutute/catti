<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西语精读</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="nav">
    <span class="nav-title">📖 西语精读</span>
    <div class="nav-buttons">
        <button onclick="loadArticle('01')">第01篇</button>
        <button onclick="loadArticle('02')">第02篇</button>
        <button onclick="loadArticle('03')">第03篇</button>
    </div>
</div>

<div class="article-card" id="article-card">
    <div id="content-wrapper">
        <p style="color:#999;padding:20px;">加载中...</p>
    </div>
</div>

<script>
    function highlight(text) {
        return text.replace(/\{\{(.+?)\}\}/g, '<span class="hl">$1</span>');
    }

    function loadArticle(file) {
        fetch(`articles/${file}.json`)
            .then(res => { if (!res.ok) throw new Error('文件未找到'); return res.json(); })
            .then(data => {
                const wrapper = document.getElementById('content-wrapper');
                wrapper.innerHTML = '';

                data.paragraphs.forEach((p, idx) => {
                    // 正文：左右对照
                    const paraBlock = document.createElement('div');
                    paraBlock.className = 'para-block';
                    paraBlock.innerHTML = `
                        <div class="col-zh">
                            <div class="col-label">中文</div>
                            <div class="col-text">${highlight(p.zh)}</div>
                        </div>
                        <div class="col-divider"></div>
                        <div class="col-es">
                            <div class="col-label">Español</div>
                            <div class="col-text">${highlight(p.es)}</div>
                        </div>
                    `;
                    wrapper.appendChild(paraBlock);

                    // 词汇区：固定搭配 + 句式模板
                    const bottomBlock = document.createElement('div');
                    bottomBlock.className = 'bottom-block';

                    const vocabItems = p.vocab.map(v =>
                        `<div class="vocab-item">
                            <span class="v-zh">${v.zh}</span>
                            <span class="v-arrow">→</span>
                            <span class="v-es">${v.es}</span>
                        </div>`
                    ).join('');

                    const patternItems = p.patterns.map(pt =>
                        `<div class="pattern-item">▌ ${pt}</div>`
                    ).join('');

                    bottomBlock.innerHTML = `
                        <div class="box vocab-box">
                            <div class="box-title">📌 固定搭配</div>
                            <div class="box-body">${vocabItems}</div>
                        </div>
                        <div class="box pattern-box">
                            <div class="box-title">✏️ 句式模板</div>
                            <div class="box-body">${patternItems}</div>
                        </div>
                    `;
                    wrapper.appendChild(bottomBlock);

                    // 篇间分隔
                    if (idx < data.paragraphs.length - 1) {
                        const sep = document.createElement('div');
                        sep.className = 'para-sep';
                        wrapper.appendChild(sep);
                    }
                });
            })
            .catch(err => {
                document.getElementById('content-wrapper').innerHTML =
                    `<p style="color:red;padding:20px;">⚠️ 加载失败：${err.message}</p>`;
            });
    }

    loadArticle('01');
</script>
</body>
</html>
