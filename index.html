<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西语精读</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="nav">
    <span class="nav-title">📖 西语精读</span>
    <div class="nav-buttons">
        <button onclick="loadArticle('01')">第01篇</button>
        <button onclick="loadArticle('02')">第02篇</button>
        <button onclick="loadArticle('03')">第03篇</button>
    </div>
</div>

<div class="article-card" id="article-card">
    <div id="content-wrapper">
        <p style="color:#999;padding:20px;">加载中...</p>
    </div>
</div>

<script>
    function highlight(text) {
        return text.replace(/\{\{(.+?)\}\}/g, '<span class="hl">$1</span>');
    }

    function loadArticle(file) {
        fetch(`articles/${file}.json`)
            .then(res => {
                if (!res.ok) throw new Error('文件未找到');
                return res.json();
            })
            .then(data => {
                const wrapper = document.getElementById('content-wrapper');
                wrapper.innerHTML = '';

                // 右侧词汇栏：固定搭配标题只出现一次
                const allVocab = data.paragraphs.map(p => p.vocab).flat();
                const vocabCol = document.createElement('div');
                vocabCol.className = 'vocab-col';
                const vocabItems = allVocab.map(v =>
                    `<div class="vocab-item">
                        <span class="v-zh">${v.zh}</span>
                        <span class="v-es">${v.es}</span>
                    </div>`
                ).join('');
                vocabCol.innerHTML = `
                    <div class="box-title">📌 固定搭配</div>
                    <div class="box-body">${vocabItems}</div>
                `;

                // 左侧正文列
                const textCol = document.createElement('div');
                textCol.className = 'text-col';

                data.paragraphs.forEach((p, idx) => {
                    const block = document.createElement('div');
                    block.className = 'para-block';
                    block.innerHTML = `
                        <div class="lang-block zh-block">
                            <div class="col-text">${highlight(p.zh)}</div>
                        </div>
                        <div class="lang-divider"></div>
                        <div class="lang-block es-block">
                            <div class="col-text">${highlight(p.es)}</div>
                        </div>
                    `;
                    textCol.appendChild(block);

                    if (idx < data.paragraphs.length - 1) {
                        const sep = document.createElement('div');
                        sep.className = 'para-sep';
                        textCol.appendChild(sep);
                    }
                });

                // 组合布局
                const layout = document.createElement('div');
                layout.className = 'layout';
                layout.appendChild(textCol);
                layout.appendChild(vocabCol);
                wrapper.appendChild(layout);
            })
            .catch(err => {
                document.getElementById('content-wrapper').innerHTML =
                    `<p style="color:red;padding:20px;">⚠️ 加载失败：${err.message}</p>`;
            });
    }

    loadArticle('01');
</script>
</body>
</html>
