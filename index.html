<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西语学习排版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container" id="app">
        <div class="content-area" id="content">
            <p style="color:#999;">加载中...</p>
        </div>
        <div class="sidebar" id="sidebar"></div>
    </div>

    <script>
        // 支持通过 URL 参数切换文章，如 ?file=article_02
        const params = new URLSearchParams(window.location.search);
        const file = params.get('file') || '01';

        fetch(`articles/${file}.json`)
            .then(res => {
                if (!res.ok) throw new Error('文件未找到');
                return res.json();
            })
            .then(data => {
                const content = document.getElementById('content');
                const sidebar = document.getElementById('sidebar');
                content.innerHTML = '';
                sidebar.innerHTML = '';

                data.paragraphs.forEach(p => {
                    // 左栏：中西对照
                    content.innerHTML += `
                        <div class="para-group">
                            <div class="zh">${p.zh}</div>
                            <div class="es">${p.es}</div>
                        </div>`;

                    // 右栏：词汇 + 句式
                    sidebar.innerHTML += `
                        <div class="section-title">固定搭配</div>
                        <ul>${p.vocab.map(v => `<li>${v.zh} → <em>${v.es}</em></li>`).join('')}</ul>
                        <div class="section-title">句式模板</div>
                        <ul>${p.patterns.map(pt => `<li>${pt}</li>`).join('')}</ul>`;
                });
            })
            .catch(err => {
                document.getElementById('content').innerHTML = `<p style="color:red;">⚠️ 加载失败：${err.message}</p>`;
            });
    </script>

</body>
</html>
