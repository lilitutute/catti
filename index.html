<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西语学习排版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="nav">
        <button onclick="loadArticle('01')">第01篇</button>
        <button onclick="loadArticle('02')">第02篇</button>
        <button onclick="loadArticle('03')">第03篇</button>
    </div>

    <div class="container">
        <div class="content-area" id="content">
            <p style="color:#999;">加载中...</p>
        </div>
        <div class="sidebar" id="sidebar"></div>
    </div>

    <script>
        function highlight(text) {
            // 把 {{词}} 转成加粗下划线，去掉花括号
            return text.replace(/\{\{(.+?)\}\}/g, '<span class="highlight">$1</span>');
        }

        function loadArticle(file) {
            fetch(`articles/${file}.json`)
                .then(res => {
                    if (!res.ok) throw new Error('文件未找到');
                    return res.json();
                })
                .then(data => {
                    const content = document.getElementById('content');
                    const sidebar = document.getElementById('sidebar');
                    content.innerHTML = '';
                    sidebar.innerHTML = '';

                    data.paragraphs.forEach(p => {
                        // 左栏：正文
                        content.innerHTML += `
                            <div class="para-group">
                                <div class="zh">${highlight(p.zh)}</div>
                                <div class="es">${highlight(p.es)}</div>
                            </div>`;

                        // 右栏：词汇表
                        const vocabItems = p.vocab.map(v => `
                            <li>
                                <span class="zh-word">${v.zh}</span>
                                <span class="arrow">→</span>
                                <span class="es-word">${v.es}</span>
                            </li>`).join('');

                        const patternItems = p.patterns.map(pt => `
                            <li>${pt}</li>`).join('');

                        sidebar.innerHTML += `
                            <div class="section-title">固定搭配</div>
                            <ul class="vocab-list">${vocabItems}</ul>
                            <div class="section-title">句式模板</div>
                            <ul class="pattern-list">${patternItems}</ul>`;
                    });
                })
                .catch(err => {
                    document.getElementById('content').innerHTML =
                        `<p style="color:red;">⚠️ 加载失败：${err.message}</p>`;
                });
        }

        loadArticle('01');
    </script>

</body>
</html>
