<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西语学习排版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 导航栏 -->
    <div class="nav">
        <button onclick="loadArticle('01')">第01篇</button>
        <button onclick="loadArticle('02')">第02篇</button>
        <button onclick="loadArticle('03')">第03篇</button>
    </div>

    <div class="container" id="app">
        <div class="content-area" id="content">
            <p style="color:#999;">加载中...</p>
        </div>
        <div class="sidebar" id="sidebar"></div>
    </div>

    <script>
function loadArticle(file) {
    fetch(`articles/${file}.json`)
        .then(res => {
            if (!res.ok) throw new Error('文件未找到');
            return res.json();
        })
        .then(data => {
            const content = document.getElementById('content');
            const sidebar = document.getElementById('sidebar');
            content.innerHTML = '';
            sidebar.innerHTML = '';

            data.paragraphs.forEach(p => {
                // 把 {{词}} 转成高亮span
                const zhText = p.zh.replace(/\{\{(.+?)\}\}/g, '<span class="highlight">$1</span>');
                const esText = p.es.replace(/\{\{(.+?)\}\}/g, '<span class="highlight">$1</span>');

                content.innerHTML += `
                    <div class="para-group">
                        <div class="zh">${zhText}</div>
                        <div class="es">${esText}</div>
                    </div>`;

                sidebar.innerHTML += `
                    <div class="section-title">固定搭配</div>
                    <ul>${p.vocab.map(v => `<li>${v.zh} → <em>${v.es}</em></li>`).join('')}</ul>
                    <div class="section-title">句式模板</div>
                    <ul>${p.patterns.map(pt => `<li>${pt}</li>`).join('')}</ul>`;
            });
        })
        .catch(err => {
            document.getElementById('content').innerHTML = `<p style="color:red;">⚠️ 加载失败：${err.message}</p>`;
        });
}

loadArticle('01');

    </script>

</body>
</html>
