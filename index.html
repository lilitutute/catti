<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西语精读</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="nav">
    <span class="nav-title">📖 西语精读</span>
    <div class="nav-buttons">
        <button onclick="loadArticle('01')">第01篇</button>
        <button onclick="loadArticle('02')">第02篇</button>
        <button onclick="loadArticle('03')">第03篇</button>
    </div>
</div>

<div class="article-card">
    <div id="content-wrapper">
        <p style="color:#999;padding:20px;">加载中...</p>
    </div>
</div>

<script>
    function highlight(text) {
        return text.replace(/\{\{(.+?)\}\}/g, '<span class="hl">$1</span>');
    }

    function loadArticle(file) {
        fetch(`articles/${file}.json`)
            .then(res => {
                if (!res.ok) throw new Error('文件未找到');
                return res.json();
            })
            .then(data => {
                const wrapper = document.getElementById('content-wrapper');
                wrapper.innerHTML = '';

                let isFirstVocab = true;

                data.paragraphs.forEach((p, idx) => {

                    // ── 中文行 ──
                    const zhRow = document.createElement('div');
                    zhRow.className = 'row-block';

                    const zhText = document.createElement('div');
                    zhText.className = 'text-col';
                    zhText.innerHTML = `
                        <div class="lang-block">
                            <div class="col-label">中文</div>
                            <div class="col-text">${highlight(p.zh)}</div>
                        </div>
                    `;

                    const zhVocab = document.createElement('div');
                    zhVocab.className = 'vocab-col';
                    const zhItems = (p.vocab_zh || p.vocab || []).map(v =>
                        `<div class="vocab-item">
                            <span class="v-zh">${v.zh}</span>
                            <span class="v-es">${v.es}</span>
                        </div>`
                    ).join('');
                    const zhTitle = isFirstVocab
                        ? `<div class="box-title">📌 固定搭配</div>`
                        : `<div class="box-title-spacer"></div>`;
                    if (isFirstVocab) isFirstVocab = false;
                    zhVocab.innerHTML = `${zhTitle}<div class="box-body">${zhItems}</div>`;

                    zhRow.appendChild(zhText);
                    zhRow.appendChild(zhVocab);
                    wrapper.appendChild(zhRow);

                    // 中西分隔虚线
                    const innerSep = document.createElement('div');
                    innerSep.className = 'lang-divider-full';
                    wrapper.appendChild(innerSep);

                    // ── 西语行 ──
                    const esRow = document.createElement('div');
                    esRow.className = 'row-block';

                    const esText = document.createElement('div');
                    esText.className = 'text-col';
                    esText.innerHTML = `
                        <div class="lang-block">
                            <div class="col-label">ESPAÑOL</div>
                            <div class="col-text">${highlight(p.es)}</div>
                        </div>
                    `;

                    const esVocab = document.createElement('div');
                    esVocab.className = 'vocab-col';
                    const esItems = (p.vocab_es || []).map(v =>
                        `<div class="vocab-item">
                            <span class="v-zh">${v.zh}</span>
                            <span class="v-es">${v.es}</span>
                        </div>`
                    ).join('');
                    esVocab.innerHTML = `<div class="box-title-spacer"></div><div class="box-body">${esItems}</div>`;

                    esRow.appendChild(esText);
                    esRow.appendChild(esVocab);
                    wrapper.appendChild(esRow);

                    // 段落分隔线
                    if (idx < data.paragraphs.length - 1) {
                        const sep = document.createElement('div');
                        sep.className = 'para-sep';
                        wrapper.appendChild(sep);
                    }
                });
            })
            .catch(err => {
                document.getElementById('content-wrapper').innerHTML =
                    `<p style="color:red;padding:20px;">⚠️ 加载失败：${err.message}</p>`;
            });
    }

    loadArticle('01');
</script>
</body>
</html>
